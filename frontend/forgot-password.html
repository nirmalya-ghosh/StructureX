<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Reset your StructureX account password">
    <title>StructureX | Password Reset</title>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <link rel="preconnect" href="https://challenges.cloudflare.com" crossorigin>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" href="/static/auth.css?v=26" as="style">
    <link rel="stylesheet" href="/static/auth.css?v=26">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body class="legal-body forgot-password-body">
    <div class="stars"></div>
    <div class="glow-sphere"></div>

    <main class="legal-shell reset-shell">
        <article class="legal-panel reset-panel">
            <div class="legal-kicker">StructureX Auth</div>
            <h1>Password reset</h1>
            <p class="legal-updated">Recover access to the Digital Twin Command Center.</p>

            <form id="forgot-request-form" class="reset-form active">
                <div class="input-group">
                    <label for="forgot-email">Account email</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="forgot-email" placeholder="name@example.com" autocomplete="email" required>
                    </div>
                </div>
                <p class="reset-help">Enter the email used for Google/Supabase sign-in. If it exists, StructureX will send a secure reset link.</p>
                <div class="reset-status" id="forgot-status" role="status" aria-live="polite"></div>
                <div class="turnstile-box" id="turnstile-forgot" data-action="forgot-password"></div>
                <button type="submit" class="btn-primary">
                    <span>Send Reset Link</span>
                    <i class="fas fa-paper-plane"></i>
                </button>
            </form>

            <form id="forgot-update-form" class="reset-form">
                <div class="input-group">
                    <label for="new-password">New password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="new-password" placeholder="Create a new password" minlength="8" autocomplete="new-password" required>
                    </div>
                </div>
                <div class="input-group">
                    <label for="confirm-password">Confirm password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-shield-halved"></i>
                        <input type="password" id="confirm-password" placeholder="Repeat the new password" minlength="8" autocomplete="new-password" required>
                    </div>
                </div>
                <div class="reset-status" id="reset-status" role="status" aria-live="polite"></div>
                <button type="submit" class="btn-primary">
                    <span>Update Password</span>
                    <i class="fas fa-key"></i>
                </button>
            </form>

            <div class="legal-actions">
                <a class="legal-link-btn secondary" href="/login"><i class="fas fa-arrow-left"></i> Back to Login</a>
            </div>
        </article>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js?render=explicit" defer></script>
    <script src="/static/auth.js?v=29" defer></script>
</body>
</html>
